# ============================
# Spring Application
# ============================
spring.application.name=pop-cube-wallet

# ============================
# DataSource (PostgreSQL)
# ============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pop_cube_wallet}
spring.datasource.username=${DB_USER:wallet_user}
spring.datasource.password=${DB_PASS:wallet_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================
# Flyway
# ============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=account_schema,wallet_schema,transaction_schema,audit_schema
spring.flyway.default-schema=public

# ============================
# Spring Modulith
# ============================
spring.modulith.events.jdbc-schema-initialization.enabled=true

# ============================
# Actuator / Observability
# ============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ============================
# Server
# ============================
server.port=${SERVER_PORT:8080}

# ============================
# API Documentation (SpringDoc)
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ============================
# Logging
# ============================
logging.level.com.edu.api.pop_cube_wallet=INFO
logging.level.org.springframework.modulith=INFO