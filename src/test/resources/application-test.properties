# Test configuration: uses H2 in-memory database for fast unit/integration tests.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS account_schema\\;CREATE SCHEMA IF NOT EXISTS wallet_schema\\;CREATE SCHEMA IF NOT EXISTS transaction_schema\\;CREATE SCHEMA IF NOT EXISTS audit_schema
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=public

spring.flyway.enabled=false

spring.modulith.events.jdbc-schema-initialization.enabled=true
