services:
  postgres:
    image: postgres:17-alpine
    container_name: pop-cube-wallet-db
    environment:
      POSTGRES_DB: ${DB_NAME:-pop_cube_wallet}
      POSTGRES_USER: ${DB_USER:-wallet_user}
      POSTGRES_PASSWORD: ${DB_PASS:-wallet_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wallet_user} -d ${DB_NAME:-pop_cube_wallet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
